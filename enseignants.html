<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Espace enseignants — Céz'0'déchet · Équipe 1</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F2EDE1;--ink:#23231A;--ink-soft:#5C5847;--leaf:#3E6B2E;--leaf-deep:#2C5121;
    --sprout:#9DBE4A;--soil:#23211A;--line:rgba(35,35,26,.14);--r:14px;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--soil);color:var(--paper);font-family:"Inter",sans-serif;
    min-height:100vh;display:grid;place-items:center;padding:24px;line-height:1.6}
  .card{width:100%;max-width:560px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--sprout)}
  h1{font-family:"Bricolage Grotesque",sans-serif;font-size:clamp(32px,6vw,52px);
    font-weight:800;letter-spacing:-.02em;margin:12px 0 10px}
  p.sub{color:#d9d3c4;margin-bottom:28px}
  .docs{display:flex;flex-direction:column;gap:12px;margin-top:8px;max-width:480px}
  .doc{display:flex;align-items:center;gap:11px;background:rgba(242,237,225,.07);
    border:1px solid rgba(242,237,225,.22);border-radius:12px;padding:14px 20px;
    text-decoration:none;color:var(--paper);font-weight:500;transition:.2s}
  .doc:hover{background:var(--leaf);border-color:var(--leaf)}
  .doc .dot{font-family:"IBM Plex Mono",monospace;color:var(--sprout)}
  .doc:hover .dot{color:var(--paper)}
  .back{display:inline-block;margin-top:28px;color:#d9d3c4;font-size:14px;text-decoration:none}
  .back:hover{color:var(--sprout)}
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Espace enseignants</span>
    <h1>Nos livrables.</h1>
    <p class="sub">Accès réservé à l'équipe pédagogique du hackathon.</p>

    <div class="docs">
      <a class="doc" href="docs/Livrable1_Gestion_de_projet_Equipe1.pdf" download>
        <span class="dot">01</span> Livrable 1
      </a>
      <a class="doc" href="docs/Livrable2_Equipe1.pdf" download><span class="dot">02</span> Livrable 2</a>
      <a class="doc" href="docs/Livrable3_Equipe1.pdf" download><span class="dot">03</span> Livrable 3</a>
      <a class="doc" href="#" download><span class="dot">04</span> Support de soutenance</a>
    </div>

    <a class="back" href="index.html">← Retour au site</a>
  </div>

  <script>
    // Garde : on ne peut arriver ici qu'après avoir saisi le bon mot de passe sur l'accueil.
    // (Sécurité côté client uniquement : suffisante pour un projet, pas infaillible.)
    try {
      if (sessionStorage.getItem("teacherOK") !== "1") {
        window.location.replace("index.html#enseignants");
      }
    } catch (e) {
      // si sessionStorage est bloqué, on laisse passer (ex : aperçu local)
    }
  </script>
</body>
</html>
